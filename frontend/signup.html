<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center">Signup</h3>

    <input id="name" class="form-control my-2" placeholder="Name">
    <input id="email" class="form-control my-2" placeholder="Email">
    <input id="password" type="password" class="form-control my-2" placeholder="Password">

    <select id="role" class="form-control my-2">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>

    <button class="btn btn-success w-100" onclick="signup()">Signup</button>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
